<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 — HEEGU STATION</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Pretendard', sans-serif;
      background: #0a0a0a;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 400px;
    }

    .logo {
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 0.12em;
      color: #fff;
      text-decoration: none;
      display: block;
      text-align: center;
      margin-bottom: 40px;
    }

    .card {
      background: #111;
      border: 1px solid #1f1f1f;
      border-radius: 18px;
      padding: 36px 32px;
    }

    .tabs {
      display: flex;
      background: #0a0a0a;
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 28px;
    }

    .tab {
      flex: 1;
      padding: 9px;
      border: none;
      border-radius: 8px;
      background: transparent;
      color: #666;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab.active {
      background: #1f1f1f;
      color: #fff;
    }

    .form-title {
      font-size: 22px;
      font-weight: 800;
      color: #fff;
      margin-bottom: 6px;
      letter-spacing: -0.02em;
    }

    .form-desc {
      font-size: 13px;
      color: #555;
      margin-bottom: 24px;
    }

    .field {
      margin-bottom: 14px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #888;
      margin-bottom: 7px;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 12px 14px;
      background: #0a0a0a;
      border: 1px solid #1f1f1f;
      border-radius: 10px;
      color: #f0f0f0;
      font-family: inherit;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #444; }
    input::placeholder { color: #333; }

    .btn-submit {
      width: 100%;
      padding: 13px;
      background: #fff;
      color: #000;
      border: none;
      border-radius: 10px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s;
    }
    .btn-submit:hover { background: #e0e0e0; }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: #333;
      font-size: 12px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #1f1f1f;
    }

    .btn-google {
      width: 100%;
      padding: 12px;
      background: transparent;
      color: #888;
      border: 1px solid #1f1f1f;
      border-radius: 10px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .btn-google:hover { border-color: #444; color: #f0f0f0; }

    .msg {
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 13px;
      display: none;
    }
    .msg.error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); color: #f87171; display: block; }
    .msg.success { background: rgba(61,220,132,0.1); border: 1px solid rgba(61,220,132,0.2); color: #3ddc84; display: block; }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: #444;
      text-decoration: none;
      transition: color 0.2s;
    }
    .back-link:hover { color: #888; }
  </style>
</head>
<body>

<div class="container">
  <a class="logo" href="/">HEEGU STATION</a>

  <div class="card">
    <div class="tabs">
      <button class="tab active" id="tab-login" onclick="switchTab('login')">로그인</button>
      <button class="tab" id="tab-signup" onclick="switchTab('signup')">회원가입</button>
    </div>

    <div id="panel-login">
      <div class="form-title">다시 오셨군요</div>
      <div class="form-desc">이메일과 비밀번호로 로그인하세요</div>

      <div class="field">
        <label>이메일</label>
        <input type="email" id="login-email" placeholder="hello@example.com" />
      </div>
      <div class="field">
        <label>비밀번호</label>
        <input type="password" id="login-pw" placeholder="••••••••" />
      </div>
      <button class="btn-submit" id="btn-login" onclick="login()">로그인</button>

      <div class="divider">또는</div>
      <button class="btn-google" onclick="loginGoogle()">
        <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/><path fill="#FBBC05" d="M3.964 10.71c-.18-.54-.282-1.117-.282-1.71s.102-1.17.282-1.71V4.958H.957C.347 6.173 0 7.548 0 9s.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/></svg>
        Google로 로그인
      </button>

      <div class="msg" id="login-msg"></div>
    </div>

    <div id="panel-signup" style="display:none">
      <div class="form-title">시작해봐요</div>
      <div class="form-desc">무료로 계정을 만들어보세요</div>

      <div class="field">
        <label>이메일</label>
        <input type="email" id="signup-email" placeholder="hello@example.com" />
      </div>
      <div class="field">
        <label>비밀번호</label>
        <input type="password" id="signup-pw" placeholder="8자 이상" />
      </div>
      <button class="btn-submit" id="btn-signup" onclick="signup()">회원가입</button>

      <div class="divider">또는</div>
      <button class="btn-google" onclick="loginGoogle()">
        <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/><path fill="#FBBC05" d="M3.964 10.71c-.18-.54-.282-1.117-.282-1.71s.102-1.17.282-1.71V4.958H.957C.347 6.173 0 7.548 0 9s.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/></svg>
        Google로 시작하기
      </button>

      <div class="msg" id="signup-msg"></div>
    </div>
  </div>

  <a class="back-link" href="/">← 홈으로</a>
</div>

<script>
  const SUPABASE_URL = 'https://blhjftuqttiaojinpptl.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJsaGpmdHVxdHRpYW9qaW5wcHRsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzMjc5NDgsImV4cCI6MjA4OTkwMzk0OH0.j4nsoSLtbMG_7dCCyxszQxKWgLbstGAwiaGWjNnoeaU';
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // URL 파라미터로 탭 결정
  const params = new URLSearchParams(location.search);
  if (params.get('mode') === 'signup') switchTab('signup');

  // 이미 로그인된 경우 앱으로 이동
  supabase.auth.getSession().then(({ data }) => {
    if (data.session) location.href = '/app.html';
  });

  function switchTab(tab) {
    document.getElementById('panel-login').style.display = tab === 'login' ? 'block' : 'none';
    document.getElementById('panel-signup').style.display = tab === 'signup' ? 'block' : 'none';
    document.getElementById('tab-login').classList.toggle('active', tab === 'login');
    document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
  }

  function showMsg(id, type, text) {
    const el = document.getElementById(id);
    el.className = 'msg ' + type;
    el.textContent = text;
  }

  async function login() {
    const email = document.getElementById('login-email').value.trim();
    const pw    = document.getElementById('login-pw').value;
    const btn   = document.getElementById('btn-login');

    if (!email || !pw) return showMsg('login-msg', 'error', '이메일과 비밀번호를 입력해주세요.');

    btn.disabled = true;
    btn.textContent = '로그인 중...';

    const { error } = await supabase.auth.signInWithPassword({ email, password: pw });

    if (error) {
      showMsg('login-msg', 'error', '이메일 또는 비밀번호가 올바르지 않습니다.');
      btn.disabled = false;
      btn.textContent = '로그인';
    } else {
      location.href = '/app.html';
    }
  }

  async function signup() {
    const email = document.getElementById('signup-email').value.trim();
    const pw    = document.getElementById('signup-pw').value;
    const btn   = document.getElementById('btn-signup');

    if (!email || !pw) return showMsg('signup-msg', 'error', '이메일과 비밀번호를 입력해주세요.');
    if (pw.length < 8) return showMsg('signup-msg', 'error', '비밀번호는 8자 이상이어야 합니다.');

    btn.disabled = true;
    btn.textContent = '가입 중...';

    const { error } = await supabase.auth.signUp({ email, password: pw });

    if (error) {
      showMsg('signup-msg', 'error', error.message);
      btn.disabled = false;
      btn.textContent = '회원가입';
    } else {
      showMsg('signup-msg', 'success', '이메일을 확인해주세요! 인증 링크가 발송되었습니다.');
      btn.disabled = false;
      btn.textContent = '회원가입';
    }
  }

  async function loginGoogle() {
    await supabase.auth.signInWithOAuth({
      provider: 'google',
      options: { redirectTo: location.origin + '/app.html' }
    });
  }

  // Enter 키
  document.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    const loginVisible = document.getElementById('panel-login').style.display !== 'none';
    if (loginVisible) login(); else signup();
  });
</script>
</body>
</html>
