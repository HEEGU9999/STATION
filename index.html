<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GU STATION</title>
  <meta property="og:title" content="GU STATION" />
  <meta property="og:description" content="GU STATION" />
  <meta property="og:url" content="https://heegu.vercel.app/" />
  <meta property="og:type" content="website" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Pretendard', sans-serif;
      background: #f2f2f2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .brand {
      display: flex;
      justify-content: center;
      margin-bottom: 28px;
    }

    .brand img {
      height: 40px;
      object-fit: contain;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 36px 32px 28px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 2px 24px rgba(0,0,0,0.08);
    }

    .card-title {
      font-size: 22px;
      font-weight: 800;
      color: #111;
      margin-bottom: 4px;
      letter-spacing: -0.02em;
    }

    .card-desc {
      font-size: 14px;
      color: #999;
      margin-bottom: 24px;
    }

    .field-label {
      font-size: 13px;
      font-weight: 600;
      color: #555;
      margin-bottom: 6px;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 13px 15px;
      background: #f5f6fa;
      border: none;
      border-radius: 10px;
      color: #111;
      font-family: inherit;
      font-size: 14px;
      outline: none;
      margin-bottom: 12px;
      transition: background 0.2s;
    }
    input:focus { background: #eeeff5; }
    input::placeholder { color: #bbb; }

    .btn-login {
      width: 100%;
      padding: 14px;
      background: #073763;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 4px;
      transition: background 0.2s;
    }
    .btn-login:hover { background: #052a4a; }
    .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }

    .msg {
      font-size: 13px;
      color: #e53e3e;
      text-align: center;
      margin-top: 12px;
      display: none;
    }
    .msg.show { display: block; }
  </style>
</head>
<body>

  <div class="brand">
    <img src="https://blhjftuqttiaojinpptl.supabase.co/storage/v1/object/public/assets/logo.png" alt="GU STATION" />
  </div>

  <div class="card">
    <div class="card-title">로그인</div>
    <div style="margin-bottom:24px"></div>

    <div class="field-label">이메일</div>
    <input type="email" id="email" placeholder="이메일을 입력하세요" />

    <div class="field-label">비밀번호</div>
    <input type="password" id="password" placeholder="비밀번호를 입력하세요" />

    <button class="btn-login" id="btn" onclick="login()">로그인</button>
    <div class="msg" id="msg"></div>
  </div>

  <script>
    const SUPA_URL = 'https://blhjftuqttiaojinpptl.supabase.co';
    const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJsaGpmdHVxdHRpYW9qaW5wcHRsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzMjc5NDgsImV4cCI6MjA4OTkwMzk0OH0.j4nsoSLtbMG_7dCCyxszQxKWgLbstGAwiaGWjNnoeaU';

    function showMsg(text) {
      const el = document.getElementById('msg');
      el.textContent = text;
      el.className = 'msg show';
    }

    const saved = localStorage.getItem('sb_session');
    if (saved) {
      try {
        const s = JSON.parse(saved);
        if (s.access_token && s.expires_at > Date.now() / 1000) location.href = '/ads.html';
      } catch(e) { localStorage.removeItem('sb_session'); }
    }

    async function login() {
      const email = document.getElementById('email').value.trim();
      const pw    = document.getElementById('password').value;
      const btn   = document.getElementById('btn');

      if (!email || !pw) { showMsg('이메일과 비밀번호를 입력해주세요.'); return; }

      btn.disabled = true;
      btn.textContent = '로그인 중...';
      document.getElementById('msg').className = 'msg';

      try {
        const res = await fetch(`${SUPA_URL}/auth/v1/token?grant_type=password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'apikey': SUPA_KEY },
          body: JSON.stringify({ email, password: pw }),
        });
        const data = await res.json();
        if (!res.ok) {
          showMsg('이메일 또는 비밀번호가 올바르지 않습니다.');
        } else {
          localStorage.setItem('sb_session', JSON.stringify(data));
          location.href = '/ads.html';
        }
      } catch(e) {
        showMsg('네트워크 오류가 발생했습니다. 다시 시도해주세요.');
      } finally {
        btn.disabled = false;
        btn.textContent = '로그인';
      }
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
  </script>
</body>
</html>
