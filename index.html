<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HEEGU STATION</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #1f1f1f;
      --text: #f0f0f0;
      --muted: #666;
      --accent: #e8e8e8;
      --primary: #ffffff;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Pretendard', sans-serif;
      overflow-x: hidden;
    }

    /* ── NAV ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 48px;
      border-bottom: 1px solid var(--border);
      background: rgba(10,10,10,0.85);
      backdrop-filter: blur(12px);
    }

    .logo {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 0.12em;
      color: var(--primary);
      text-decoration: none;
    }

    .nav-right {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .btn-ghost {
      padding: 9px 20px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: transparent;
      color: var(--muted);
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
    }
    .btn-ghost:hover { border-color: #444; color: var(--text); }

    .btn-solid {
      padding: 9px 20px;
      border: 1px solid var(--primary);
      border-radius: 8px;
      background: var(--primary);
      color: #000;
      font-family: inherit;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
    }
    .btn-solid:hover { background: #e0e0e0; border-color: #e0e0e0; }

    /* ── HERO ── */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 120px 24px 80px;
      position: relative;
    }

    /* 배경 그라디언트 오브 */
    .hero::before {
      content: '';
      position: absolute;
      top: 20%;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(ellipse, rgba(255,255,255,0.04) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      border: 1px solid var(--border);
      border-radius: 100px;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 32px;
      letter-spacing: 0.05em;
    }

    .hero-badge .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #3ddc84;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .hero h1 {
      font-size: clamp(52px, 8vw, 96px);
      font-weight: 900;
      letter-spacing: -0.03em;
      line-height: 1;
      color: var(--primary);
      margin-bottom: 8px;
    }

    .hero h1 span {
      color: transparent;
      -webkit-text-stroke: 1px rgba(255,255,255,0.3);
    }

    .hero-sub {
      font-size: clamp(14px, 2vw, 18px);
      color: var(--muted);
      margin-top: 20px;
      margin-bottom: 44px;
      line-height: 1.6;
      max-width: 440px;
    }

    .hero-cta {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn-hero-primary {
      padding: 14px 32px;
      background: var(--primary);
      color: #000;
      border: none;
      border-radius: 10px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
      letter-spacing: -0.01em;
    }
    .btn-hero-primary:hover { background: #e0e0e0; transform: translateY(-1px); }

    .btn-hero-secondary {
      padding: 14px 32px;
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
    }
    .btn-hero-secondary:hover { border-color: #444; color: var(--text); }

    /* ── FEATURES ── */
    .features {
      padding: 100px 48px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .section-label {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.12em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .section-title {
      font-size: clamp(28px, 4vw, 40px);
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--primary);
      margin-bottom: 56px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      transition: border-color 0.2s;
    }
    .card:hover { border-color: #333; }

    .card-icon {
      width: 40px; height: 40px;
      background: var(--border);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
      font-size: 18px;
    }

    .card h3 {
      font-size: 16px;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 8px;
    }

    .card p {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.6;
    }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 32px 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: var(--muted);
      font-size: 13px;
    }

    @media (max-width: 640px) {
      nav { padding: 16px 20px; }
      .features { padding: 60px 20px; }
      footer { padding: 24px 20px; flex-direction: column; gap: 8px; }
    }
  </style>
</head>
<body>

  <nav>
    <a class="logo" href="/">HEEGU STATION</a>
    <div class="nav-right">
      <a class="btn-ghost" href="/login.html">로그인</a>
      <a class="btn-solid" href="/login.html?mode=signup">시작하기</a>
    </div>
  </nav>

  <section class="hero">
    <div class="hero-badge">
      <span class="dot"></span>
      지금 바로 사용 가능
    </div>
    <h1>HEEGU<br><span>STATION</span></h1>
    <p class="hero-sub">QR 코드를 빠르고 간편하게 만들어보세요.<br>링크 하나로 시작합니다.</p>
    <div class="hero-cta">
      <a class="btn-hero-primary" href="/login.html?mode=signup">무료로 시작하기</a>
      <a class="btn-hero-secondary" href="/login.html">로그인</a>
    </div>
  </section>

  <section class="features">
    <div class="section-label">Features</div>
    <div class="section-title">필요한 건 링크 하나</div>
    <div class="cards">
      <div class="card">
        <div class="card-icon">⚡</div>
        <h3>즉시 생성</h3>
        <p>URL을 입력하는 즉시 QR 코드가 실시간으로 생성됩니다.</p>
      </div>
      <div class="card">
        <div class="card-icon">🎨</div>
        <h3>커스터마이징</h3>
        <p>색상, 테두리, 스타일을 자유롭게 설정할 수 있습니다.</p>
      </div>
      <div class="card">
        <div class="card-icon">📥</div>
        <h3>PNG 다운로드</h3>
        <p>완성된 QR 코드를 고화질 이미지로 즉시 저장하세요.</p>
      </div>
    </div>
  </section>

  <footer>
    <span>© 2026 HEEGU STATION</span>
    <span>Made with Claude</span>
  </footer>

</body>
</html>
