<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HEEGU STATION</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #0d0d0d;
      font-family: 'Pretendard', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .center {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      padding: 24px;
    }

    .title {
      font-size: 36px;
      font-weight: 800;
      letter-spacing: 0.18em;
      color: #ffffff;
      margin-bottom: 8px;
      text-align: center;
    }

    .subtitle {
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.12em;
      color: #555;
      margin-bottom: 40px;
      text-align: center;
    }

    .card {
      background: #1a1a1a;
      border-radius: 14px;
      padding: 28px 28px 24px;
      width: 100%;
      max-width: 340px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 13px 16px;
      background: #0d0d0d;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      color: #f0f0f0;
      font-family: inherit;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    input::placeholder { color: #444; }
    input:focus { border-color: #555; }

    .btn-login {
      width: 100%;
      padding: 13px;
      background: #ffffff;
      color: #000000;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 4px;
      transition: background 0.2s;
      letter-spacing: 0.02em;
    }
    .btn-login:hover { background: #e0e0e0; }
    .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }

    .msg {
      font-size: 13px;
      text-align: center;
      padding: 10px;
      border-radius: 7px;
      display: none;
    }
    .msg.error { background: rgba(239,68,68,0.1); color: #f87171; display: block; }
  </style>
</head>
<body>
  <div class="center">
    <div class="title">HEEGU STATION</div>
    <div class="subtitle">Personal Hub</div>

    <div class="card">
      <input type="email" id="email" placeholder="이메일" />
      <input type="password" id="password" placeholder="비밀번호" />
      <button class="btn-login" id="btn" onclick="login()">로그인</button>
      <div class="msg" id="msg"></div>
    </div>
  </div>

  <script>
    const supabase = window.supabase.createClient(
      'https://blhjftuqttiaojinpptl.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJsaGpmdHVxdHRpYW9qaW5wcHRsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzMjc5NDgsImV4cCI6MjA4OTkwMzk0OH0.j4nsoSLtbMG_7dCCyxszQxKWgLbstGAwiaGWjNnoeaU'
    );

    // 이미 로그인된 경우
    supabase.auth.getSession().then(({ data }) => {
      if (data.session) location.href = '/app.html';
    });

    async function login() {
      const email = document.getElementById('email').value.trim();
      const pw    = document.getElementById('password').value;
      const btn   = document.getElementById('btn');
      const msg   = document.getElementById('msg');

      if (!email || !pw) {
        msg.className = 'msg error';
        msg.textContent = '이메일과 비밀번호를 입력해주세요.';
        return;
      }

      btn.disabled = true;
      btn.textContent = '로그인 중...';
      msg.className = 'msg';

      const { error } = await supabase.auth.signInWithPassword({ email, password: pw });

      if (error) {
        msg.className = 'msg error';
        msg.textContent = '이메일 또는 비밀번호가 올바르지 않습니다.';
        btn.disabled = false;
        btn.textContent = '로그인';
      } else {
        location.href = '/app.html';
      }
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') login();
    });
  </script>
</body>
</html>
