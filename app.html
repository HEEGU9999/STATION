<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HEEGU STATION</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Pretendard', sans-serif;
      background: #f2f2f2;
      min-height: 100vh;
    }

    /* ── 헤더 ── */
    header {
      background: #fff;
      border-bottom: 1px solid #e8e8e8;
      padding: 0 40px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 9px;
      text-decoration: none;
    }

    .brand-logo {
      width: 30px;
      height: 30px;
      border-radius: 7px;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 13px;
      font-weight: 900;
    }

    .brand-name {
      font-size: 15px;
      font-weight: 800;
      color: #111;
      letter-spacing: -0.01em;
    }

    /* 네비 */
    nav {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .nav-btn {
      padding: 7px 14px;
      border-radius: 8px;
      border: none;
      background: transparent;
      color: #555;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s, color 0.15s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .nav-btn:hover { background: #f2f2f2; color: #111; }
    .nav-btn.active { background: #f2f2f2; color: #111; }

    .nav-divider {
      width: 1px;
      height: 18px;
      background: #e8e8e8;
      margin: 0 6px;
    }

    .btn-logout {
      padding: 7px 14px;
      border-radius: 8px;
      border: 1px solid #e8e8e8;
      background: transparent;
      color: #999;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-logout:hover { border-color: #ccc; color: #555; }

    /* ── 콘텐츠 ── */
    .content {
      max-width: 960px;
      margin: 36px auto;
      padding: 0 24px;
    }

    .page-title {
      font-size: 22px;
      font-weight: 800;
      color: #111;
      letter-spacing: -0.02em;
      margin-bottom: 20px;
    }

    /* QR 레이아웃 */
    .qr-layout {
      display: flex;
      gap: 20px;
      align-items: flex-start;
    }

    /* 설정 패널 */
    .panel {
      flex: 1;
      background: #fff;
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 1px 8px rgba(0,0,0,0.06);
    }

    .sec-label {
      font-size: 11px;
      font-weight: 700;
      color: #bbb;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 10px;
    }

    .field-label {
      font-size: 13px;
      font-weight: 600;
      color: #555;
      margin-bottom: 7px;
    }

    input.url-input {
      width: 100%;
      padding: 12px 14px;
      background: #f5f6fa;
      border: none;
      border-radius: 10px;
      color: #111;
      font-family: inherit;
      font-size: 14px;
      outline: none;
      transition: background 0.2s;
    }
    input.url-input:focus { background: #eeeff5; }
    input.url-input::placeholder { color: #bbb; }

    .divider { height: 1px; background: #f0f0f0; margin: 20px 0; }

    /* 색상 팔레트 */
    .palette-row { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }

    .swatch {
      width: 26px; height: 26px;
      border-radius: 6px;
      cursor: pointer;
      border: 2.5px solid transparent;
      transition: transform 0.12s, border-color 0.12s;
    }
    .swatch:hover { transform: scale(1.15); }
    .swatch.selected { border-color: #111; transform: scale(1.15); }
    .swatch[data-color="#ffffff"] { border-color: #ddd; }
    .swatch[data-color="#ffffff"].selected { border-color: #111; }

    .plus-btn {
      width: 26px; height: 26px;
      border-radius: 6px;
      border: 1.5px dashed #ccc;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      color: #bbb;
      position: relative;
      transition: border-color 0.15s;
    }
    .plus-btn:hover { border-color: #888; color: #888; }
    .plus-btn input[type="color"] {
      position: absolute; width: 100%; height: 100%;
      opacity: 0; cursor: pointer; top: 0; left: 0; border: none; padding: 0;
    }

    .two-col { display: flex; gap: 20px; }
    .two-col > .col { flex: 1; }

    /* 테두리 버튼 */
    .bstyle-row { display: flex; gap: 7px; margin-bottom: 16px; }
    .bstyle-btn {
      flex: 1;
      padding: 8px 4px 6px;
      border: 1.5px solid #e8e8e8;
      border-radius: 9px;
      background: #fff;
      cursor: pointer;
      font-family: inherit;
      font-size: 10px;
      color: #999;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      transition: all 0.15s;
    }
    .bstyle-btn:hover { border-color: #ccc; }
    .bstyle-btn.active { border-color: #111; background: #f7f7f7; color: #111; font-weight: 700; }
    .bstyle-btn svg { width: 26px; height: 26px; }

    /* 슬라이더 */
    .slider-row { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    input[type="range"] { flex: 1; accent-color: #111; cursor: pointer; }
    .slider-val { font-size: 12px; font-weight: 600; color: #999; min-width: 32px; text-align: right; }

    /* 오류 정정 */
    .ec-row { display: flex; gap: 6px; }
    .ec-btn {
      flex: 1;
      padding: 8px 4px;
      border: 1.5px solid #e8e8e8;
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
      font-family: inherit;
      text-align: center;
      transition: all 0.15s;
    }
    .ec-btn:hover { border-color: #ccc; }
    .ec-btn.active { border-color: #111; background: #f7f7f7; }
    .ec-btn .lv { font-size: 14px; font-weight: 800; color: #999; display: block; }
    .ec-btn.active .lv { color: #111; }
    .ec-btn .desc { font-size: 10px; color: #ccc; }
    .ec-tip { font-size: 11px; color: #bbb; margin-top: 8px; line-height: 1.5; }

    .regen-btn {
      width: 100%;
      padding: 12px;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 6px;
      transition: background 0.2s;
    }
    .regen-btn:hover { background: #333; }

    /* 미리보기 */
    .preview-panel {
      width: 270px;
      flex-shrink: 0;
      position: sticky;
      top: 80px;
    }

    .preview-card {
      background: #fff;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 1px 8px rgba(0,0,0,0.06);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .preview-title {
      font-size: 14px;
      font-weight: 700;
      color: #111;
      margin-bottom: 18px;
      align-self: flex-start;
    }

    #qr-stage {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 14px;
      min-height: 160px;
    }

    #qr-inner { display: inline-block; line-height: 0; }
    #qr-inner canvas, #qr-inner img { display: block; }

    .filename-input {
      width: 100%;
      padding: 10px 12px;
      background: #f5f6fa;
      border: none;
      border-radius: 9px;
      color: #111;
      font-family: inherit;
      font-size: 13px;
      outline: none;
      margin-bottom: 10px;
    }
    .filename-input::placeholder { color: #bbb; }

    .dl-btn {
      width: 100%;
      padding: 12px;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }
    .dl-btn:hover { background: #333; }

    @media (max-width: 700px) {
      .qr-layout { flex-direction: column; }
      .preview-panel { width: 100%; position: static; }
      header { padding: 0 16px; }
      .content { margin: 20px auto; }
    }
  </style>
</head>
<body>

  <!-- 헤더 -->
  <header>
    <a class="brand" href="/app.html">
      <div class="brand-logo">H</div>
      <span class="brand-name">HEEGU STATION</span>
    </a>

    <nav>
      <a class="nav-btn active" href="/app.html">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/>
          <path d="M14 14h2v2h-2zM18 14h2v2h-2zM14 18h2v2h-2zM18 18h2v2h-2z" fill="currentColor" stroke="none"/>
        </svg>
        QR 코드 생성기
      </a>

      <div class="nav-divider"></div>
      <button class="btn-logout" onclick="logout()">로그아웃</button>
    </nav>
  </header>

  <!-- 콘텐츠 -->
  <div class="content">
    <div class="page-title">QR 코드 생성기</div>

    <div class="qr-layout">

      <!-- 설정 -->
      <div class="panel">

        <div class="sec-label">링크</div>
        <input class="url-input" id="url-input" type="text" placeholder="https://example.com" value="https://example.com" />

        <div class="divider"></div>
        <div class="sec-label">색상</div>
        <div class="two-col">
          <div class="col">
            <div class="field-label">QR 색상</div>
            <div class="palette-row" id="fg-palette"></div>
          </div>
          <div class="col">
            <div class="field-label">배경 색상</div>
            <div class="palette-row" id="bg-palette"></div>
          </div>
        </div>

        <div class="divider"></div>
        <div class="sec-label">테두리</div>
        <div class="field-label" style="margin-bottom:9px">스타일</div>
        <div class="bstyle-row">
          <button class="bstyle-btn active" onclick="setBorderStyle('none',this)">
            <svg viewBox="0 0 26 26"><rect x="3" y="3" width="20" height="20" fill="#e8e8e8"/></svg>없음
          </button>
          <button class="bstyle-btn" onclick="setBorderStyle('solid',this)">
            <svg viewBox="0 0 26 26"><rect x="3" y="3" width="20" height="20" fill="#e8e8e8" stroke="#111" stroke-width="2"/></svg>실선
          </button>
          <button class="bstyle-btn" onclick="setBorderStyle('rounded',this)">
            <svg viewBox="0 0 26 26"><rect x="3" y="3" width="20" height="20" rx="5" fill="#e8e8e8" stroke="#111" stroke-width="2"/></svg>둥근
          </button>
          <button class="bstyle-btn" onclick="setBorderStyle('dashed',this)">
            <svg viewBox="0 0 26 26"><rect x="3" y="3" width="20" height="20" fill="#e8e8e8" stroke="#111" stroke-width="2" stroke-dasharray="4 2"/></svg>점선
          </button>
        </div>

        <div class="field-label">두께</div>
        <div class="slider-row">
          <input type="range" id="border-width" min="0" max="24" value="4" oninput="onSlider('border-width','bw-val');liveUpdate()">
          <span class="slider-val" id="bw-val">4px</span>
        </div>
        <div class="field-label">여백</div>
        <div class="slider-row">
          <input type="range" id="padding" min="0" max="40" value="10" oninput="onSlider('padding','pad-val');liveUpdate()">
          <span class="slider-val" id="pad-val">10px</span>
        </div>
        <div class="field-label">테두리 색상</div>
        <div class="palette-row" id="border-palette" style="margin-bottom:0"></div>

        <div class="divider"></div>
        <div class="sec-label">오류 정정</div>
        <div class="ec-row">
          <button class="ec-btn" onclick="setEC('L',this)"><span class="lv">L</span><span class="desc">7%</span></button>
          <button class="ec-btn" onclick="setEC('M',this)"><span class="lv">M</span><span class="desc">15%</span></button>
          <button class="ec-btn" onclick="setEC('Q',this)"><span class="lv">Q</span><span class="desc">25%</span></button>
          <button class="ec-btn active" onclick="setEC('H',this)"><span class="lv">H★</span><span class="desc">30%</span></button>
        </div>
        <p class="ec-tip">★ H: 30% 손상돼도 인식 가능. 권장.</p>

        <div style="margin-top:20px">
          <button class="regen-btn" onclick="liveUpdate()">재생성</button>
        </div>
      </div>

      <!-- 미리보기 -->
      <div class="preview-panel">
        <div class="preview-card">
          <div class="preview-title">미리보기</div>
          <div id="qr-stage">
            <div id="qr-inner"><div id="qr-code"></div></div>
          </div>
          <input class="filename-input" id="filename-input" type="text" placeholder="파일명 (기본: qrcode)" />
          <button class="dl-btn" onclick="download()">이미지 저장 (PNG)</button>
        </div>
      </div>

    </div>
  </div>

<script>
  const SUPA_URL = 'https://blhjftuqttiaojinpptl.supabase.co';
  const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJsaGpmdHVxdHRpYW9qaW5wcHRsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzMjc5NDgsImV4cCI6MjA4OTkwMzk0OH0.j4nsoSLtbMG_7dCCyxszQxKWgLbstGAwiaGWjNnoeaU';

  // 인증 확인
  const saved = localStorage.getItem('sb_session');
  if (!saved) {
    location.href = '/';
  } else {
    try {
      const s = JSON.parse(saved);
      if (!s.access_token || s.expires_at < Date.now() / 1000) {
        localStorage.removeItem('sb_session');
        location.href = '/';
      }
    } catch(e) { localStorage.removeItem('sb_session'); location.href = '/'; }
  }

  function logout() {
    localStorage.removeItem('sb_session');
    location.href = '/';
  }

  // ── QR ──
  const QR_SIZE = 200;
  const state = { fg: '#000000', bg: '#ffffff', borderColor: '#000000', borderStyle: 'none', ec: 'H' };
  const RAINBOW = ['#ef4444','#f97316','#eab308','#22c55e','#3b82f6','#4f46e5','#a855f7','#000000','#ffffff'];

  function buildPalette(containerId, defaultColor, onPick) {
    const wrap = document.getElementById(containerId);
    let customSwatch = null;

    function selectSwatch(el, color) {
      wrap.querySelectorAll('.swatch').forEach(s => s.classList.remove('selected'));
      el.classList.add('selected');
      onPick(color);
      liveUpdate();
    }

    RAINBOW.forEach(c => {
      const el = document.createElement('div');
      el.className = 'swatch';
      el.style.background = c;
      el.dataset.color = c;
      if (c === defaultColor) el.classList.add('selected');
      el.onclick = () => selectSwatch(el, c);
      wrap.appendChild(el);
    });

    const plusBtn = document.createElement('div');
    plusBtn.className = 'plus-btn';
    plusBtn.innerHTML = `<span style="pointer-events:none">+</span><input type="color" value="#ff0000">`;
    plusBtn.querySelector('input[type="color"]').addEventListener('input', function() {
      const c = this.value;
      if (!customSwatch) {
        customSwatch = document.createElement('div');
        customSwatch.className = 'swatch';
        wrap.insertBefore(customSwatch, plusBtn);
      }
      customSwatch.style.background = c;
      customSwatch.dataset.color = c;
      customSwatch.onclick = () => selectSwatch(customSwatch, c);
      selectSwatch(customSwatch, c);
    });
    wrap.appendChild(plusBtn);
  }

  buildPalette('fg-palette', '#000000', c => state.fg = c);
  buildPalette('bg-palette', '#ffffff', c => state.bg = c);
  buildPalette('border-palette', '#000000', c => state.borderColor = c);

  function onSlider(id, valId) {
    document.getElementById(valId).textContent = document.getElementById(id).value + 'px';
  }

  function setBorderStyle(style, btn) {
    state.borderStyle = style;
    document.querySelectorAll('.bstyle-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    liveUpdate();
  }

  function setEC(level, btn) {
    state.ec = level;
    document.querySelectorAll('.ec-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    liveUpdate();
  }

  let renderTimer = null;
  function liveUpdate() {
    clearTimeout(renderTimer);
    renderTimer = setTimeout(renderQR, 40);
  }

  function renderQR() {
    const url = document.getElementById('url-input').value.trim() || 'https://example.com';
    const ecMap = { L: QRCode.CorrectLevel.L, M: QRCode.CorrectLevel.M, Q: QRCode.CorrectLevel.Q, H: QRCode.CorrectLevel.H };
    const bw  = parseInt(document.getElementById('border-width').value) || 0;
    const pad = parseInt(document.getElementById('padding').value) || 0;

    document.getElementById('qr-code').innerHTML = '';
    new QRCode(document.getElementById('qr-code'), {
      text: url, width: QR_SIZE, height: QR_SIZE,
      colorDark: state.fg, colorLight: state.bg,
      correctLevel: ecMap[state.ec],
    });

    setTimeout(() => {
      const inner = document.getElementById('qr-inner');
      inner.style.padding = pad + 'px';
      inner.style.background = state.bg;
      if (state.borderStyle === 'none' || bw === 0) {
        inner.style.border = 'none'; inner.style.borderRadius = '0';
      } else {
        inner.style.border = `${bw}px ${state.borderStyle === 'dashed' ? 'dashed' : 'solid'} ${state.borderColor}`;
        inner.style.borderRadius = state.borderStyle === 'rounded' ? '12px' : '0';
      }
    }, 60);
  }

  function download() {
    const inner = document.getElementById('qr-inner');
    const canvas = inner.querySelector('canvas');
    const img    = inner.querySelector('img');
    const pad    = parseInt(document.getElementById('padding').value) || 0;
    const bw     = parseInt(document.getElementById('border-width').value) || 0;
    const total  = QR_SIZE + pad * 2 + bw * 2;
    const out    = document.createElement('canvas');
    out.width = total; out.height = total;
    const ctx = out.getContext('2d');

    ctx.fillStyle = state.bg;
    ctx.fillRect(0, 0, total, total);

    if (state.borderStyle !== 'none' && bw > 0) {
      ctx.strokeStyle = state.borderColor;
      ctx.lineWidth = bw;
      ctx.setLineDash(state.borderStyle === 'dashed' ? [8, 4] : []);
      const half = bw / 2;
      const r = state.borderStyle === 'rounded' ? 12 : 0;
      if (r > 0) { ctx.beginPath(); ctx.roundRect(half, half, total - bw, total - bw, r); ctx.stroke(); }
      else { ctx.strokeRect(half, half, total - bw, total - bw); }
    }

    const drawImg = src => {
      const image = new Image();
      image.onload = () => {
        ctx.drawImage(image, bw + pad, bw + pad, QR_SIZE, QR_SIZE);
        const fname = (document.getElementById('filename-input').value.trim() || 'qrcode').replace(/\.png$/i, '');
        const a = document.createElement('a');
        a.href = out.toDataURL('image/png');
        a.download = fname + '.png';
        a.click();
      };
      image.src = src;
    };

    if (canvas) drawImg(canvas.toDataURL('image/png'));
    else if (img) drawImg(img.src);
  }

  document.getElementById('url-input').addEventListener('input', liveUpdate);
  document.getElementById('url-input').addEventListener('keydown', e => { if (e.key === 'Enter') liveUpdate(); });
  renderQR();
</script>
</body>
</html>
