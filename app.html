<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GU STATION</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #073763;
      --primary-hover: #052a4a;
      --primary-light: #e8eef6;
      --primary-text: #073763;
      --border: #e8e8e8;
      --bg: #f4f5f7;
      --surface: #fff;
      --text: #111;
      --muted: #888;
      --label: #555;
    }

    body {
      font-family: 'Pretendard', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      overflow-x: hidden;
    }

    /* ── 사이드바 ── */
    .sidebar {
      width: 210px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      height: 100vh;
      position: sticky;
      top: 0;
    }

    .sidebar-logo {
      padding: 18px 16px 14px;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      justify-content: center;
    }

    .sidebar-logo img {
      height: 26px;
      object-fit: contain;
    }

    .sidebar-nav {
      flex: 1;
      padding: 10px 8px;
      overflow-y: auto;
    }

    .nav-section-label {
      font-size: 10px;
      font-weight: 700;
      color: #bbb;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 10px 10px 6px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 9px 12px;
      border-radius: 8px;
      text-decoration: none;
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      margin-bottom: 2px;
      border: none;
      background: transparent;
      width: 100%;
      text-align: left;
      font-family: inherit;
    }
    .nav-item:hover { background: var(--bg); color: var(--text); }
    .nav-item.active { background: var(--primary-light); color: var(--primary-text); }
    .nav-item.active .nav-icon { color: var(--primary-text); }

    .nav-icon {
      width: 16px; height: 16px;
      color: #bbb;
      flex-shrink: 0;
      transition: color 0.15s;
    }
    .nav-item:hover .nav-icon { color: var(--muted); }

    .sidebar-bottom {
      padding: 12px 8px;
      border-top: 1px solid #f0f0f0;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 8px 12px;
      margin-bottom: 2px;
    }

    .user-avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--primary-light);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 800;
      color: var(--primary-text);
      flex-shrink: 0;
    }

    .user-email {
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .btn-logout {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 8px 12px;
      border-radius: 8px;
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      color: #bbb;
      background: transparent;
      border: none;
      cursor: pointer;
      width: 100%;
      transition: background 0.15s, color 0.15s;
    }
    .btn-logout:hover { background: #fff0f0; color: #e53e3e; }

    /* ── 메인 ── */
    .main {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 28px;
      height: 50px;
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }

    .page-breadcrumb {
      font-size: 13px;
      color: #bbb;
    }
    .page-breadcrumb span { color: var(--text); font-weight: 700; }

    .content {
      padding: 24px 28px;
      overflow-y: auto;
      flex: 1;
    }

    .page-title {
      font-size: 18px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.02em;
      margin-bottom: 18px;
    }

    /* ── QR 레이아웃 ── */
    .qr-layout {
      display: flex;
      gap: 18px;
      align-items: flex-start;
    }

    .panel {
      flex: 1;
      min-width: 0;
      background: var(--surface);
      border-radius: 14px;
      padding: 22px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.05);
    }

    /* URL 입력 행 */
    .url-row {
      display: flex;
      gap: 8px;
      margin-bottom: 0;
    }

    input.url-input {
      flex: 1;
      min-width: 0;
      padding: 10px 13px;
      background: #f5f6fa;
      border: none;
      border-radius: 8px;
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      outline: none;
      transition: background 0.2s;
    }
    input.url-input:focus { background: #eeeff5; }
    input.url-input::placeholder { color: #bbb; }

    .regen-inline {
      padding: 10px 16px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s;
    }
    .regen-inline:hover { background: var(--primary-hover); }

    .divider { height: 1px; background: #f4f5f7; margin: 16px 0; }

    .sec-label {
      font-size: 10px;
      font-weight: 700;
      color: #bbb;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 10px;
    }

    .field-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--label);
      margin-bottom: 7px;
    }

    /* 팔레트 */
    .palette-row { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; }

    .swatch {
      width: 22px; height: 22px;
      border-radius: 5px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform 0.12s, border-color 0.12s;
      flex-shrink: 0;
    }
    .swatch:hover { transform: scale(1.2); }
    .swatch.selected { border-color: var(--primary); transform: scale(1.2); }
    .swatch[data-color="#ffffff"] { border-color: #ddd; }
    .swatch[data-color="#ffffff"].selected { border-color: var(--primary); }

    .plus-btn {
      width: 22px; height: 22px;
      border-radius: 5px;
      border: 1.5px dashed #ccc;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      color: #bbb;
      position: relative;
      transition: border-color 0.15s;
    }
    .plus-btn:hover { border-color: #888; color: #888; }
    .plus-btn input[type="color"] {
      position: absolute; width: 100%; height: 100%;
      opacity: 0; cursor: pointer; top: 0; left: 0; border: none; padding: 0;
    }

    .two-col { display: flex; gap: 20px; }
    .two-col > .col { flex: 1; min-width: 0; }

    /* 테두리 */
    .bstyle-row { display: flex; gap: 6px; margin-bottom: 14px; }
    .bstyle-btn {
      flex: 1;
      padding: 8px 4px 6px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      cursor: pointer;
      font-family: inherit;
      font-size: 10px;
      color: #aaa;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      transition: all 0.15s;
    }
    .bstyle-btn:hover { border-color: #ccc; }
    .bstyle-btn.active { border-color: var(--primary); background: var(--primary-light); color: var(--primary-text); font-weight: 700; }
    .bstyle-btn svg { width: 24px; height: 24px; }

    /* 슬라이더 */
    .slider-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    input[type="range"] { flex: 1; accent-color: var(--primary); cursor: pointer; }
    .slider-val { font-size: 11px; font-weight: 700; color: var(--muted); min-width: 30px; text-align: right; }

    /* 오류 정정 */
    .ec-row { display: flex; gap: 6px; }
    .ec-btn {
      flex: 1; padding: 7px 4px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      cursor: pointer;
      font-family: inherit;
      text-align: center;
      transition: all 0.15s;
    }
    .ec-btn:hover { border-color: #ccc; }
    .ec-btn.active { border-color: var(--primary); background: var(--primary-light); }
    .ec-btn .lv { font-size: 13px; font-weight: 800; color: #aaa; display: block; }
    .ec-btn.active .lv { color: var(--primary-text); }
    .ec-btn .desc { font-size: 10px; color: #ccc; }
    .ec-tip { font-size: 11px; color: #bbb; margin-top: 7px; line-height: 1.5; }

    /* ── 미리보기 ── */
    .preview-panel {
      width: 240px;
      flex-shrink: 0;
      position: sticky;
      top: 20px;
    }

    .preview-card {
      background: var(--surface);
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.05);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .preview-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 14px;
      align-self: flex-start;
    }

    /* 고정 크기 미리보기 컨테이너 */
    #qr-stage {
      width: 200px;
      height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 14px;
      overflow: hidden;
      position: relative;
    }

    #qr-inner {
      display: inline-block;
      line-height: 0;
      transform-origin: center center;
      /* transform은 JS에서 동적으로 적용 */
    }
    #qr-inner canvas, #qr-inner img { display: block; }

    .filename-input {
      width: 100%;
      padding: 9px 11px;
      background: #f5f6fa;
      border: none;
      border-radius: 8px;
      color: var(--text);
      font-family: inherit;
      font-size: 12px;
      outline: none;
      margin-bottom: 9px;
    }
    .filename-input::placeholder { color: #bbb; }

    .dl-btn {
      width: 100%;
      padding: 11px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 9px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }
    .dl-btn:hover { background: var(--primary-hover); }
  </style>
</head>
<body>

  <!-- 사이드바 -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <img src="https://blhjftuqttiaojinpptl.supabase.co/storage/v1/object/public/assets/logo.png" alt="GU STATION" />
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section-label">메뉴</div>
      <a class="nav-item active" href="/app.html">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <rect x="3" y="3" width="7" height="7" rx="1.5"/>
          <rect x="14" y="3" width="7" height="7" rx="1.5"/>
          <rect x="3" y="14" width="7" height="7" rx="1.5"/>
          <path d="M14 14h2v2h-2zM18 14h2v2h-2zM14 18h2v2h-2zM18 18h2v2h-2z" fill="currentColor" stroke="none"/>
        </svg>
        QR 코드 생성기
      </a>
      <!-- 추후 메뉴 추가 -->
    </nav>

    <div class="sidebar-bottom">
      <div class="user-info">
        <div class="user-avatar" id="user-avatar">G</div>
        <div class="user-email" id="user-email">...</div>
      </div>
      <button class="btn-logout" onclick="logout()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        로그아웃
      </button>
    </div>
  </aside>

  <!-- 메인 -->
  <div class="main">
    <div class="topbar">
      <span class="page-breadcrumb">메뉴 › <span>QR 코드 생성기</span></span>
    </div>

    <div class="content">
      <div class="page-title">QR 코드 생성기</div>

      <div class="qr-layout">

        <!-- 설정 패널 -->
        <div class="panel">

          <!-- URL + 재생성 -->
          <div class="sec-label">링크</div>
          <div class="url-row">
            <input class="url-input" id="url-input" type="text" placeholder="https://example.com" value="https://example.com" />
            <button class="regen-inline" onclick="liveUpdate()">재생성</button>
          </div>

          <div class="divider"></div>

          <!-- 색상 -->
          <div class="sec-label">색상</div>
          <div class="two-col">
            <div class="col">
              <div class="field-label">QR 색상</div>
              <div class="palette-row" id="fg-palette"></div>
            </div>
            <div class="col">
              <div class="field-label">배경 색상</div>
              <div class="palette-row" id="bg-palette"></div>
            </div>
          </div>

          <div class="divider"></div>

          <!-- 테두리 -->
          <div class="sec-label">테두리</div>
          <div class="field-label" style="margin-bottom:8px">스타일</div>
          <div class="bstyle-row">
            <button class="bstyle-btn active" onclick="setBorderStyle('none',this)">
              <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" fill="#e8e8e8"/></svg>없음
            </button>
            <button class="bstyle-btn" onclick="setBorderStyle('solid',this)">
              <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" fill="#e8e8e8" stroke="#073763" stroke-width="2"/></svg>실선
            </button>
            <button class="bstyle-btn" onclick="setBorderStyle('rounded',this)">
              <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="5" fill="#e8e8e8" stroke="#073763" stroke-width="2"/></svg>둥근
            </button>
            <button class="bstyle-btn" onclick="setBorderStyle('dashed',this)">
              <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" fill="#e8e8e8" stroke="#073763" stroke-width="2" stroke-dasharray="4 2"/></svg>점선
            </button>
          </div>

          <div class="field-label">두께</div>
          <div class="slider-row">
            <input type="range" id="border-width" min="0" max="24" value="4" oninput="onSlider('border-width','bw-val');liveUpdate()">
            <span class="slider-val" id="bw-val">4px</span>
          </div>

          <div class="field-label">여백</div>
          <div class="slider-row">
            <input type="range" id="padding" min="0" max="40" value="10" oninput="onSlider('padding','pad-val');liveUpdate()">
            <span class="slider-val" id="pad-val">10px</span>
          </div>

          <div class="field-label">테두리 색상</div>
          <div class="palette-row" id="border-palette"></div>

          <div class="divider"></div>

          <!-- 오류 정정 -->
          <div class="sec-label">오류 정정 레벨</div>
          <div class="ec-row">
            <button class="ec-btn" onclick="setEC('L',this)"><span class="lv">L</span><span class="desc">7%</span></button>
            <button class="ec-btn" onclick="setEC('M',this)"><span class="lv">M</span><span class="desc">15%</span></button>
            <button class="ec-btn" onclick="setEC('Q',this)"><span class="lv">Q</span><span class="desc">25%</span></button>
            <button class="ec-btn active" onclick="setEC('H',this)"><span class="lv">H★</span><span class="desc">30%</span></button>
          </div>
          <p class="ec-tip">★ H: 30% 손상·가려져도 인식 가능. 기본 권장.</p>
        </div>

        <!-- 미리보기 -->
        <div class="preview-panel">
          <div class="preview-card">
            <div class="preview-title">미리보기</div>
            <div id="qr-stage">
              <div id="qr-inner"><div id="qr-code"></div></div>
            </div>
            <input class="filename-input" id="filename-input" type="text" placeholder="파일명 (기본: qrcode)" />
            <button class="dl-btn" onclick="download()">이미지 저장 (PNG)</button>
          </div>
        </div>

      </div>
    </div>
  </div>

<script>
  const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJsaGpmdHVxdHRpYW9qaW5wcHRsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzMjc5NDgsImV4cCI6MjA4OTkwMzk0OH0.j4nsoSLtbMG_7dCCyxszQxKWgLbstGAwiaGWjNnoeaU';
  const STAGE_SIZE = 200; // 고정 미리보기 크기
  const QR_SIZE    = 200;

  // 인증 확인
  const saved = localStorage.getItem('sb_session');
  if (!saved) {
    location.href = '/';
  } else {
    try {
      const s = JSON.parse(saved);
      if (!s.access_token || s.expires_at < Date.now() / 1000) {
        localStorage.removeItem('sb_session'); location.href = '/';
      } else {
        const email = s.user?.email || '';
        document.getElementById('user-email').textContent = email;
        document.getElementById('user-avatar').textContent = email.charAt(0).toUpperCase();
      }
    } catch(e) { localStorage.removeItem('sb_session'); location.href = '/'; }
  }

  function logout() {
    localStorage.removeItem('sb_session');
    location.href = '/';
  }

  const state = { fg: '#000000', bg: '#ffffff', borderColor: '#000000', borderStyle: 'none', ec: 'H' };
  const RAINBOW = ['#ef4444','#f97316','#eab308','#22c55e','#3b82f6','#073763','#a855f7','#000000','#ffffff'];

  function buildPalette(containerId, defaultColor, onPick) {
    const wrap = document.getElementById(containerId);
    let customSwatch = null;
    function selectSwatch(el, color) {
      wrap.querySelectorAll('.swatch').forEach(s => s.classList.remove('selected'));
      el.classList.add('selected');
      onPick(color);
      liveUpdate();
    }
    RAINBOW.forEach(c => {
      const el = document.createElement('div');
      el.className = 'swatch';
      el.style.background = c;
      el.dataset.color = c;
      if (c === defaultColor) el.classList.add('selected');
      el.onclick = () => selectSwatch(el, c);
      wrap.appendChild(el);
    });
    const plusBtn = document.createElement('div');
    plusBtn.className = 'plus-btn';
    plusBtn.innerHTML = `<span style="pointer-events:none">+</span><input type="color" value="#ff0000">`;
    plusBtn.querySelector('input[type="color"]').addEventListener('input', function() {
      const c = this.value;
      if (!customSwatch) {
        customSwatch = document.createElement('div');
        customSwatch.className = 'swatch';
        wrap.insertBefore(customSwatch, plusBtn);
      }
      customSwatch.style.background = c;
      customSwatch.dataset.color = c;
      customSwatch.onclick = () => selectSwatch(customSwatch, c);
      selectSwatch(customSwatch, c);
    });
    wrap.appendChild(plusBtn);
  }

  buildPalette('fg-palette',     '#000000', c => state.fg = c);
  buildPalette('bg-palette',     '#ffffff', c => state.bg = c);
  buildPalette('border-palette', '#000000', c => state.borderColor = c);

  function onSlider(id, valId) {
    document.getElementById(valId).textContent = document.getElementById(id).value + 'px';
  }
  function setBorderStyle(style, btn) {
    state.borderStyle = style;
    document.querySelectorAll('.bstyle-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    liveUpdate();
  }
  function setEC(level, btn) {
    state.ec = level;
    document.querySelectorAll('.ec-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    liveUpdate();
  }

  let renderTimer = null;
  function liveUpdate() {
    clearTimeout(renderTimer);
    renderTimer = setTimeout(renderQR, 40);
  }

  function renderQR() {
    const url = document.getElementById('url-input').value.trim() || 'https://example.com';
    const ecMap = { L: QRCode.CorrectLevel.L, M: QRCode.CorrectLevel.M, Q: QRCode.CorrectLevel.Q, H: QRCode.CorrectLevel.H };
    const bw  = parseInt(document.getElementById('border-width').value) || 0;
    const pad = parseInt(document.getElementById('padding').value) || 0;

    document.getElementById('qr-code').innerHTML = '';
    new QRCode(document.getElementById('qr-code'), {
      text: url, width: QR_SIZE, height: QR_SIZE,
      colorDark: state.fg, colorLight: state.bg,
      correctLevel: ecMap[state.ec],
    });

    setTimeout(() => {
      const inner = document.getElementById('qr-inner');
      inner.style.padding = pad + 'px';
      inner.style.background = state.bg;

      if (state.borderStyle === 'none' || bw === 0) {
        inner.style.border = 'none';
        inner.style.borderRadius = '0';
      } else {
        inner.style.border = `${bw}px ${state.borderStyle === 'dashed' ? 'dashed' : 'solid'} ${state.borderColor}`;
        inner.style.borderRadius = state.borderStyle === 'rounded' ? '12px' : '0';
      }

      // 미리보기 고정 크기: 실제 크기가 STAGE_SIZE보다 크면 축소
      const totalSize = QR_SIZE + pad * 2 + bw * 2;
      const scale = totalSize > STAGE_SIZE ? STAGE_SIZE / totalSize : 1;
      inner.style.transform = `scale(${scale})`;
    }, 60);
  }

  function download() {
    const inner = document.getElementById('qr-inner');
    const canvas = inner.querySelector('canvas');
    const img    = inner.querySelector('img');
    const pad    = parseInt(document.getElementById('padding').value) || 0;
    const bw     = parseInt(document.getElementById('border-width').value) || 0;
    const total  = QR_SIZE + pad * 2 + bw * 2;

    const out = document.createElement('canvas');
    out.width = total; out.height = total;
    const ctx = out.getContext('2d');

    ctx.fillStyle = state.bg;
    ctx.fillRect(0, 0, total, total);

    if (state.borderStyle !== 'none' && bw > 0) {
      ctx.strokeStyle = state.borderColor;
      ctx.lineWidth = bw;
      ctx.setLineDash(state.borderStyle === 'dashed' ? [8, 4] : []);
      const half = bw / 2;
      const r = state.borderStyle === 'rounded' ? 12 : 0;
      if (r > 0) { ctx.beginPath(); ctx.roundRect(half, half, total - bw, total - bw, r); ctx.stroke(); }
      else { ctx.strokeRect(half, half, total - bw, total - bw); }
    }

    const drawImg = src => {
      const image = new Image();
      image.onload = () => {
        ctx.drawImage(image, bw + pad, bw + pad, QR_SIZE, QR_SIZE);
        const fname = (document.getElementById('filename-input').value.trim() || 'qrcode').replace(/\.png$/i, '');
        const a = document.createElement('a');
        a.href = out.toDataURL('image/png');
        a.download = fname + '.png';
        a.click();
      };
      image.src = src;
    };

    if (canvas) drawImg(canvas.toDataURL('image/png'));
    else if (img) drawImg(img.src);
  }

  document.getElementById('url-input').addEventListener('input', liveUpdate);
  document.getElementById('url-input').addEventListener('keydown', e => { if (e.key === 'Enter') liveUpdate(); });
  renderQR();
</script>
</body>
</html>
